<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인간 전력거래 게시글 목록</title>
    <link rel="stylesheet" href="/css/p2p/board-list-modern.css" th:href="@{/css/p2p/board-list-modern.css}">
</head>
<body>
<div class="board-page">
    <header class="board-topbar">
        <a class="topbar-icon" th:href="@{/ev/main}" aria-label="뒤로가기">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M16.076 2.576l.848.848L8.35 12l8.575 8.576-.848.848L6.65 12l9.425-9.424z" fill="currentColor"></path>
            </svg>
        </a>
        <h1>개인간 전력거래</h1>
        <a class="topbar-icon" th:href="@{/ev/main}" aria-label="홈으로 가기">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
                <path d="M21.6 7.679l-9.6-6.4-9.6 6.4V21h1.2V8.321l8.4-5.6 8.4 5.6V21h1.2V7.679z" fill="currentColor"></path>
                <path d="M15.6 21v-8.6H8.4V21h1.2v-7.4h4.8V21h1.2z" fill="currentColor"></path>
            </svg>
        </a>
    </header>

    <main class="board-shell">
        <section class="hero">
            <div>
                <h2>실시간 전력거래 게시글을 확인하세요</h2>
                <p class="hero-desc">와디즈 스타일 카드형 목록으로 최신 거래 글을 한눈에 확인할 수 있습니다.</p>
            </div>
            <button class="write-btn" type="button" onclick="location.href='/p2p/write'">글 작성</button>
        </section>

        <div th:if="${successMessage}" class="message success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="message error" th:text="${errorMessage}"></div>

        <section th:if="${boards != null and boards.size() > 0}" class="card-list">
            <article th:each="board : ${boards}" class="board-card">
                <a th:href="@{/p2p/detail/{id}(id=${board.id})}" class="card-link">
                    <div class="thumb-wrap"
                         th:if="${board.representativeFilePath != null and board.representativeFileName != null}">
                        <img th:src="@{/api/files/display(filePath=${board.representativeFilePath}, fileName=${board.representativeFileName})}"
                             alt="대표 이미지"
                             class="card-thumb">
                    </div>
                    <div class="thumb-empty"
                         th:if="${board.representativeFilePath == null or board.representativeFileName == null}">
                        대표 이미지 없음
                    </div>

                    <div class="card-body">
                        <div class="card-top">
                            <span th:if="${board.boardFilter != null and board.boardFilter.name() == 'BUY'}" class="type-badge buy">구매</span>
                            <span th:if="${board.boardFilter != null and board.boardFilter.name() == 'SELL'}" class="type-badge sell">판매</span>
                            <span class="card-date" th:text="${board.createdDate}"></span>
                        </div>

                        <h3 class="card-title" th:text="${board.title}"></h3>
                        <p class="card-content" th:text="${board.summary != null ? board.summary : board.content}"></p>
                    </div>
                </a>

                <div class="card-footer">
                    <span class="writer"
                          th:text="${board.memberNickname != null and !#strings.isEmpty(board.memberNickname) ? board.memberNickname : '작성자 #' + board.boardMemberId}">
                        작성자
                    </span>
                    <div class="actions" th:if="${currentMemberId != null and currentMemberId == board.boardMemberId}">
                        <a class="action-btn" th:href="@{/p2p/update(id=${board.id})}">수정</a>
                        <button type="button" class="action-btn danger" th:onclick="|deleteBoard(${board.id})|">삭제</button>
                    </div>
                </div>
            </article>
        </section>

        <section th:if="${boards == null or boards.isEmpty()}" class="empty-state">
            <h3>등록된 게시글이 없습니다</h3>
            <p>첫 게시글을 등록해 보세요.</p>
            <a th:href="@{/p2p/write}" class="write-link">첫 게시글 작성하기</a>
        </section>

        <nav class="pagination" th:if="${criteria != null and criteria.realEnd > 0}">
            <a class="page-btn"
               th:if="${currentPage > 1}"
               th:href="@{/p2p/list(page=1)}">«</a>
            <a class="page-btn"
               th:if="${currentPage > 1}"
               th:href="@{/p2p/list(page=${currentPage - 1})}">‹</a>

            <a th:each="i : ${#numbers.sequence(criteria.startPage, criteria.endPage)}"
               class="page-btn"
               th:classappend="${currentPage == i} ? ' active'"
               th:text="${i}"
               th:href="@{/p2p/list(page=${i})}"></a>

            <a class="page-btn"
               th:if="${criteria.hasMore}"
               th:href="@{/p2p/list(page=${currentPage + 1})}">›</a>
            <a class="page-btn"
               th:if="${criteria.hasMore}"
               th:href="@{/p2p/list(page=${criteria.realEnd})}">»</a>
        </nav>
    </main>
</div>

<script>
    function deleteBoard(boardId) {
        if (confirm('정말로 이 게시글을 삭제하시겠습니까?')) {
            location.href = '/p2p/delete?id=' + boardId;
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const messages = document.querySelectorAll('.message');
        messages.forEach(function(msg) {
            setTimeout(function() {
                msg.style.display = 'none';
            }, 5000);
        });
    });
</script>
</body>
</html>
